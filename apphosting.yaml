runConfig:
  runtime: nodejs22
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  # MCP가 유상태 세션(transport)을 인스턴스 메모리에 보관하므로 1개로 고정한다.
  # 세션 어피니티가 없어 2개 이상이면 후속 요청이 다른 인스턴스로 가서 연결이 끊긴다.
  maxInstances: 1

buildCommand: npm run build

env:
  # ── 빌드 & 런타임 공통 ──────────────────────────────────────────
  - variable: NODE_ENV
    value: production

  - variable: APP_BASE_PATH
    value: /

  - variable: APP_URL
    value: https://class.damuna.org

  # ── Vite 프론트엔드 빌드 시 번들에 포함 (공개 키) ─────────────
  - variable: VITE_GOOGLE_PICKER_API_KEY
    value: AIzaSyB586MSkADndLvJY1GYqy7SuQcAWCLIsSM

  - variable: VITE_GOOGLE_OAUTH_CLIENT_ID
    value: 1049224228341-p1qe72is5mc7mosv31ba5fo000c5qqs4.apps.googleusercontent.com

  # ── 서버 전용 시크릿 (Secret Manager) ────────────────────────────
  # ChatGPT(GPT Actions)/Claude(MCP) 관리 API 키 — 배포 전 반드시 생성:
  #   firebase apphosting:secrets:set ADMIN_API_KEY
  - variable: ADMIN_API_KEY
    secret: ADMIN_API_KEY

  - variable: GOOGLE_SERVICE_ACCOUNT_JSON
    secret: GOOGLE_SERVICE_ACCOUNT_JSON
