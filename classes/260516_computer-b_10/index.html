<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../../shared/sidebar.css">
  <title>260516_컴퓨터B_10</title>
  <style>
    :root { --bg:#f8f2e8; --panel:rgba(255,251,245,.95); --ink:#17253d; --muted:#61708a; --line:#e7d9c8; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"Segoe UI","Malgun Gothic",sans-serif; color:var(--ink); background:var(--bg); }
    .wrap { width:min(980px, calc(100% - 28px)); margin:0 auto; padding:28px 0 40px; }
    .panel { background:var(--panel); border:2px solid var(--line); border-radius:28px; padding:28px; box-shadow:0 14px 34px rgba(23,37,61,.08); }
    h1,h2,p { margin:0; }
    h1 { font-size:clamp(34px, 6vw, 62px); line-height:.95; letter-spacing:-.04em; margin-bottom:16px; }
    .lead { font-size:21px; line-height:1.5; color:var(--muted); margin-bottom:20px; }
    .meta,.todo { display:grid; gap:12px; }
    .meta { grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); margin-bottom:18px; }
    .meta div,.todo div { background:#fff; border:2px solid var(--line); border-radius:18px; padding:16px; }
    .meta strong,.todo strong { display:block; font-size:22px; margin-bottom:8px; }
    .meta span,.todo span { display:block; font-size:17px; color:var(--muted); line-height:1.45; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; margin-top:18px; }
    .actions a { text-decoration:none; color:inherit; background:#fff; border:2px solid var(--line); border-radius:999px; padding:12px 16px; font-weight:800; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>260516_컴퓨터B_10</h1>
      <p class="lead">토요일 2반 수업 자료 자리입니다. 여기에 실제 강의 파일이나 학생에게 보여줄 수업 페이지를 연결하면 됩니다.</p>
      <div class="meta">
        <div><strong>수업</strong><span>컴퓨터 B반</span></div>
        <div><strong>날짜</strong><span>2026-05-16</span></div>
        <div><strong>시간</strong><span>토요일 15:00-16:50</span></div>
        <div><strong>상태</strong><span>진행 예정</span></div>
      </div>
      <div class="todo">
        <div><strong>여기에 넣을 것</strong><span>수업 주제, 핵심 단어 3개 국어 번역, 큰 화면용 이미지, 실습 순서</span></div>
        <div><strong>권장 흐름</strong><span>도입 ? 핵심 단어 ? 시범 ? 따라하기 ? 직접하기 ? 정리</span></div>
        <div><strong>다음 작업</strong><span>이 페이지를 실제 수업 자료 HTML로 바꾸거나, 새 자료 파일을 만들어 여기서 연결</span></div>
      </div>
      <div class="actions">
        <a href="../index.html">강의 항목으로 돌아가기</a>
        <a href="../../index.html">메인 허브</a>
      </div>
    </section>
  </div>
  <script defer src="../../shared/sidebar.js"></script>
</body>
</html>
