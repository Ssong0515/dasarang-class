name: Deploy to Lightsail

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LIGHTSAIL_HOST: ${{ vars.LIGHTSAIL_HOST }}
      LIGHTSAIL_USER: ${{ vars.LIGHTSAIL_USER }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      SYSTEMD_SERVICE: ${{ vars.SYSTEMD_SERVICE }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build app
        run: npm run build

      - name: Validate deploy configuration
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          set -euo pipefail
          [ -n "${LIGHTSAIL_HOST}" ] || { echo "Missing repo variable LIGHTSAIL_HOST"; exit 1; }
          [ -n "${LIGHTSAIL_USER}" ] || { echo "Missing repo variable LIGHTSAIL_USER"; exit 1; }
          [ -n "${DEPLOY_PATH}" ] || { echo "Missing repo variable DEPLOY_PATH"; exit 1; }
          [ -n "${SYSTEMD_SERVICE}" ] || { echo "Missing repo variable SYSTEMD_SERVICE"; exit 1; }
          [ -n "${LIGHTSAIL_SSH_KEY}" ] || { echo "Missing repo secret LIGHTSAIL_SSH_KEY"; exit 1; }

      - name: Configure SSH
        env:
          LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${LIGHTSAIL_SSH_KEY}" > ~/.ssh/lightsail_key
          chmod 600 ~/.ssh/lightsail_key
          ssh-keyscan -H "${LIGHTSAIL_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy on Lightsail
        run: |
          set -euo pipefail
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/lightsail_key "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" \
            "DEPLOY_PATH='${DEPLOY_PATH}' SYSTEMD_SERVICE='${SYSTEMD_SERVICE}' bash -se" <<'EOF'
          set -euo pipefail
          cd "${DEPLOY_PATH}"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          
          # Stop and disable legacy systemd service to free up port 3100
          if sudo systemctl is-active --quiet "${SYSTEMD_SERVICE}"; then
            echo "Stopping legacy systemd service ${SYSTEMD_SERVICE}..."
            sudo systemctl stop "${SYSTEMD_SERVICE}" || true
            sudo systemctl disable "${SYSTEMD_SERVICE}" || true
          fi
          
          # Build and start the docker container
          docker compose up -d --build
          
          # Wait for health check
          echo "Waiting for service to become healthy..."
          for attempt in $(seq 1 15); do
            if curl --fail --silent http://127.0.0.1:3100/dasarang-class/api/health >/dev/null; then
              echo "Deployment successful!"
              exit 0
            fi
            sleep 2
          done
          
          echo "Health check failed. Showing docker logs:"
          docker compose logs --tail=20
          exit 1
          EOF
