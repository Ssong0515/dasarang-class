<title>바탕화면 마스터</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
  body { font-family: "Malgun Gothic", "맑은 고딕", system-ui, sans-serif; color: #1f2330; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 16px 16px 60px; }

  .head { text-align: center; margin-bottom: 10px; }
  .head h1 { font-size: 32px; letter-spacing: -1px; }
  .head p { font-size: 18px; color: #5b6172; margin-top: 4px; }
  .hud { display: inline-flex; gap: 14px; align-items: center; margin-top: 10px;
    background: #fff7e6; border: 2px solid #ffe2a6; border-radius: 999px; padding: 6px 18px; }
  .hud .sc { font-size: 20px; font-weight: 900; color: #d98a00; }
  .hud .combo { font-size: 18px; font-weight: 900; color: #e8584f; min-width: 56px; text-align: left; }
  .hud .combo.pop { animation: cpop .35s; }
  @keyframes cpop { 0%{ transform: scale(.5); } 60%{ transform: scale(1.35); } 100%{ transform: scale(1); } }

  .tracker { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    background: #f4f6fb; border-radius: 16px; padding: 10px; margin: 12px 0 16px; }
  .chip { display: flex; align-items: center; gap: 5px; font-size: 14px; font-weight: 700;
    color: #9aa0b4; background: #fff; border: 2px solid #e4e8f2; border-radius: 999px; padding: 6px 12px; transition: .25s; }
  .chip.now { border-color: #3b6fe0; color: #3b6fe0; box-shadow: 0 0 0 3px #e8f0ff; }
  .chip.done { color: #1a7f47; border-color: #56cf8c; background: #eafaf0; }

  .card { background: #fff; border: 3px solid #e7ebf5; border-radius: 22px; padding: 22px 20px;
    box-shadow: 0 10px 30px rgba(40,55,90,.06); min-height: 520px; display: flex; flex-direction: column; }
  .step-no { font-size: 16px; font-weight: 800; color: #3b6fe0; margin-bottom: 2px; }
  .title { font-size: 25px; font-weight: 800; line-height: 1.25; margin-bottom: 6px; }
  .guide { font-size: 19px; color: #4a4f60; line-height: 1.45; margin-bottom: 6px; }
  .guide b { color: #d6452b; }
  .roundbar { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 4px; }
  .round-badge { font-size: 14px; font-weight: 800; color: #8a5cf6; background: #f1ebff; border-radius: 999px; padding: 4px 12px; }
  .round-badge.boss { color: #fff; background: linear-gradient(90deg,#f0a32e,#e8584f); }
  .progress { font-size: 17px; font-weight: 800; color: #3b6fe0; text-align: center; margin-bottom: 6px; }

  /* 시각 큐: "이걸 찾아요" */
  .cue { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 2px auto 8px;
    background: #eef3ff; border: 3px solid #cfe0ff; border-radius: 18px; padding: 10px 18px; }
  .cue .lab { font-size: 14px; font-weight: 800; color: #3b6fe0; }
  .cue .big { font-size: 50px; line-height: 1; }
  .cue .nm { font-size: 20px; font-weight: 900; color: #1f2330; }
  .cue.pop { animation: cpop .3s; }

  .feedback { text-align: center; font-size: 20px; font-weight: 800; color: #1a7f47; min-height: 28px; margin-top: 8px; }
  .feedback.no { color: #d6452b; }   /* 틀리면 빨강, 맞으면 초록(기본) */
  .btn { align-self: center; margin-top: 10px; font-family: inherit; font-size: 21px; font-weight: 800;
    color: #fff; background: #3b6fe0; border: none; border-radius: 14px; padding: 14px 36px; cursor: pointer;
    box-shadow: 0 6px 0 #2a55b8; transition: .1s; }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #2a55b8; }
  .btn.gray { background:#8b93a7; box-shadow:0 6px 0 #6c7589; }
  .btn.gold { background: linear-gradient(90deg,#f0a32e,#e8884f); box-shadow:0 6px 0 #c06a1f; }

  .name-in { font-family: inherit; font-size: 22px; text-align: center; padding: 12px 16px; width: 260px;
    border: 3px solid #cfd6e6; border-radius: 12px; -webkit-user-select: text; user-select: text; }

  /* ===== 가짜 컴퓨터 화면 ===== */
  .desk { position: relative; width: 100%; max-width: 660px; margin: 4px auto 0; height: 340px;
    background: linear-gradient(160deg, #6fa8e6, #9ed0f0); border: 8px solid #2f3441; border-radius: 14px;
    overflow: hidden; box-shadow: inset 0 0 30px rgba(0,0,0,.18); }
  .icons { position: absolute; top: 12px; left: 12px; right: 12px; bottom: 56px;
    display: grid; grid-template-columns: repeat(auto-fill, 80px); gap: 8px 12px; align-content: start; }
  .dicon { width: 80px; text-align: center; cursor: pointer; padding: 6px 2px; border-radius: 10px; transition: .1s; }
  .dicon .ie { font-size: 38px; line-height: 1; filter: drop-shadow(0 3px 4px rgba(0,0,0,.25)); }
  .dicon small { display: block; font-size: 12px; font-weight: 700; color: #fff; margin-top: 2px; text-shadow: 0 1px 2px rgba(0,0,0,.5); }
  .dicon:hover { background: rgba(255,255,255,.18); }
  .dicon.hit { animation: pophit .35s; }
  .dicon.wrongshake { animation: shake .4s; }
  @keyframes pophit { 50% { transform: scale(1.25); } }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }

  .taskbar { position: absolute; left: 0; right: 0; bottom: 0; height: 48px; background: rgba(28,32,44,.92);
    display: flex; align-items: center; gap: 8px; padding: 0 10px; }
  .startbtn { font-size: 22px; width: 40px; height: 36px; border-radius: 8px; background: #3b6fe0; color: #fff;
    display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .startbtn:active { transform: translateY(2px); }
  .pinslot { width: 38px; height: 36px; border-radius: 8px; background: rgba(255,255,255,.12);
    display: flex; align-items: center; justify-content: center; font-size: 22px; color: #cfe0ff; transition: .15s; }
  .pinslot.over { outline: 3px solid #ffe08a; background: rgba(255,255,255,.3); }
  .pinslot.filled { background: rgba(255,255,255,.24); }
  .tb-label { margin-left: auto; font-size: 11px; color: #9fb4d8; font-weight: 700; padding-right: 4px; }

  .win { position: absolute; top: 38px; left: 50%; transform: translateX(-50%); width: 290px;
    background: #fff; border-radius: 10px; box-shadow: 0 14px 30px rgba(0,0,0,.35); overflow: hidden; animation: winin .25s; }
  @keyframes winin { from{ transform: translate(-50%,12px); opacity:0; } to{ transform: translate(-50%,0); opacity:1; } }
  .win .bar { display: flex; align-items: center; background: #eef2fb; padding: 7px 8px; font-weight: 800; font-size: 14px; color:#2f3445; }
  .win .bar .wbtns { margin-left: auto; display: flex; gap: 5px; }
  .win .bar .wb { width: 26px; height: 23px; border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; font-weight: 900; }
  .win .bar .wb.min { background: #e7ebf5; color: #5b6172; }
  .win .bar .wb.max { background: #e7ebf5; color: #5b6172; }
  .win .bar .wb.x { background: #e8584f; color: #fff; }
  .win .bar .wb:active { transform: scale(.9); }
  .win .body { padding: 20px 12px; text-align: center; font-size: 38px; }
  .win .body small { display:block; font-size: 14px; color:#5b6172; font-weight:700; margin-top:6px; }

  .floater { position: fixed; font-size: 40px; z-index: 999; pointer-events: none; touch-action: none; }

  .done-screen { text-align: center; }
  .done-screen .big { font-size: 56px; }
  .done-screen h2 { font-size: 27px; margin: 6px 0; }
  .stars { font-size: 20px; font-weight: 800; color: #f0a32e; margin: 2px 0 6px; }
  .badges { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 8px 0; }
  .badge { background: #fff7e6; border: 2px solid #ffd98a; border-radius: 14px; padding: 8px 12px; font-size: 15px; font-weight: 800; color: #b5740a; }
  .badge .be { font-size: 24px; display: block; }
  .sheet { display: inline-block; text-align: left; background: #fbfdff; border: 2px solid #dbe3f2;
    border-radius: 14px; padding: 16px 24px; margin-top: 6px; }
  .sheet h3 { font-size: 19px; margin-bottom: 8px; color:#3b6fe0; }
  .sheet li { list-style: none; font-size: 19px; line-height: 1.75; color: #2f3445; }
  .sheet .mine { color:#1a7f47; font-weight:800; }
  .sheet .who-line { margin-top: 10px; padding-top: 8px; border-top: 1px dashed #dbe3f2; font-size: 16px; color: #5b6172; }
  .result-card { background:#fff; padding: 8px 6px 16px; border-radius: 18px; }
  .row-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }
  @media print { .row-btns, .head p, .hud, .tracker { display: none; } .card { border: none; box-shadow: none; } }
</style>

<div class="wrap">
  <div class="head">
    <h1>🖥️ 바탕화면 마스터</h1>
    <p>그림을 보고 똑같이 찾아요! 🔎</p>
    <div class="hud"><span class="sc">⭐ <span id="hs">0</span></span><span class="combo" id="hc"></span></div>
  </div>

  <div class="tracker" id="tracker">
    <div class="chip" data-m="0">① 화면 이름</div>
    <div class="chip" data-m="1">② 같은 그림 찾기</div>
    <div class="chip" data-m="2">③ 창 열고 닫기</div>
    <div class="chip" data-m="3">④ 즐겨찾기</div>
    <div class="chip" data-m="4">⑤ 종합 도전</div>
  </div>

  <div class="card" id="card"></div>
</div>

<script>
(function () {
  var card = document.getElementById('card');
  var chips = [].slice.call(document.querySelectorAll('.chip'));
  var chipLabels = ['① 화면 이름', '② 같은 그림 찾기', '③ 창 열고 닫기', '④ 즐겨찾기', '⑤ 종합 도전'];
  var studentName = '';
  var score = 0, combo = 0, maxCombo = 0, miss = 0;
  var myPins = [];

  function byId(id){ return document.getElementById(id); }
  function setNow(i){ chips.forEach(function(c,k){ c.classList.toggle('now', k===i && !c.classList.contains('done')); }); }
  function markDone(i){ var c=chips[i]; if(c){ c.classList.add('done'); c.classList.remove('now'); c.textContent='✅ '+c.textContent.replace(/^[①②③④⑤✅]\s*/, ''); } }
  function btn(label, fn, cls){ var b=document.createElement('button'); b.className='btn'+(cls?' '+cls:''); b.textContent=label; b.addEventListener('click', fn); return b; }
  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
  var cheers = ['좋아요!','잘했어요!','멋져요!','최고예요!','대단해요!','완벽해요!'];

  /* 점수·콤보 */
  function hud(){ byId('hs').textContent=score; var hc=byId('hc');
    if(combo>=2){ hc.textContent='🔥 x'+combo; hc.classList.remove('pop'); void hc.offsetWidth; hc.classList.add('pop'); } else hc.textContent=''; }
  function good(){ combo++; if(combo>maxCombo)maxCombo=combo; score += 1 + Math.max(0, combo-1); hud(); var fe=byId('fb'); if(fe) fe.classList.remove('no'); }
  function bad(){ combo=0; miss++; hud(); var fe=byId('fb'); if(fe) fe.classList.add('no'); }
  function comboMsg(base){ return combo>=3 ? base+' 🔥콤보 x'+combo+'!' : base; }

  /* ===== 결과물 저장 헬퍼 (외부 라이브러리 0) ===== */
  var SAVE = {
    capture: function(node, done){
      try {
        var rect = node.getBoundingClientRect();
        var w = Math.max(1, Math.ceil(rect.width)), h = Math.max(1, Math.ceil(rect.height));
        var scale = 2, css = '';
        for (var i=0;i<document.styleSheets.length;i++){ try { var rules=document.styleSheets[i].cssRules; for(var j=0;j<rules.length;j++) css+=rules[j].cssText+'\n'; } catch(e){} }
        var holder=document.createElement('div'); holder.appendChild(node.cloneNode(true));
        var svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+w+'" height="'+h+'">'+
          '<foreignObject x="0" y="0" width="'+w+'" height="'+h+'">'+
          '<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+w+'px;background:#ffffff;">'+
          '<style>'+css+'</style>'+holder.innerHTML+'</div></foreignObject></svg>';
        var img=new Image();
        img.onload=function(){
          try {
            var canvas=document.createElement('canvas'); canvas.width=w*scale; canvas.height=h*scale;
            var ctx=canvas.getContext('2d'); ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.setTransform(scale,0,0,scale,0,0); ctx.drawImage(img,0,0);
            done(canvas.toDataURL('image/png'));
          } catch(e){ done(null); }
        };
        img.onerror=function(){ done(null); };
        img.src='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      } catch(e){ done(null); }
    },
    download: function(dataUrl, name){
      var a=document.createElement('a'); a.href=dataUrl; a.download=name; document.body.appendChild(a); a.click(); a.remove();
    }
  };

  /* 아이콘 카탈로그 (k=고유키, 비슷한 그림끼리 함정으로 씀) */
  var ICONS = [
    {k:'web', e:'🌐', n:'인터넷'}, {k:'memo', e:'📝', n:'메모장'}, {k:'calc', e:'🧮', n:'계산기'},
    {k:'pic', e:'🖼️', n:'사진'}, {k:'cam', e:'📷', n:'카메라'}, {k:'paint', e:'🎨', n:'그림판'},
    {k:'music', e:'🎵', n:'음악'}, {k:'head', e:'🎧', n:'헤드폰'}, {k:'doc', e:'📄', n:'문서'},
    {k:'docs', e:'📃', n:'쪽지'}, {k:'folder', e:'📁', n:'폴더'}, {k:'folder2', e:'📂', n:'열린폴더'},
    {k:'game', e:'🎮', n:'게임'}, {k:'mail', e:'✉️', n:'메일'}, {k:'star', e:'⭐', n:'즐겨찾기'}, {k:'trash', e:'🗑️', n:'휴지통'}
  ];
  /* 비슷하게 생긴 함정 그룹 */
  var LOOKALIKE = { pic:['cam','paint'], cam:['pic','paint'], paint:['pic','cam'], music:['head'], head:['music'], doc:['docs','memo'], docs:['doc','memo'], folder:['folder2'], folder2:['folder'] };
  function iconByK(k){ for(var i=0;i<ICONS.length;i++) if(ICONS[i].k===k) return ICONS[i]; return null; }

  function deskHTML(){
    return '<div class="desk" id="desk">' +
      '<div class="icons" id="icons"></div>' +
      '<div class="taskbar" id="taskbar">' +
        '<div class="startbtn" id="start">⊞</div>' +
        '<div class="pinslot" id="p0"></div><div class="pinslot" id="p1"></div><div class="pinslot" id="p2"></div>' +
        '<div class="tb-label">작업 표시줄</div>' +
      '</div></div>';
  }
  function fillIcons(list){
    var box=byId('icons'); box.innerHTML='';
    list.forEach(function(it){
      var d=document.createElement('div'); d.className='dicon'; d.dataset.k=it.k;
      d.innerHTML='<div class="ie">'+it.e+'</div><small>'+it.n+'</small>';
      box.appendChild(d);
    });
  }
  function flashHit(el){ el.classList.add('hit'); setTimeout(function(){ el.classList.remove('hit'); }, 350); }
  function flashWrong(el){ if(!el) return; el.classList.remove('wrongshake'); void el.offsetWidth; el.classList.add('wrongshake'); }

  /* ===== 시작 ===== */
  function start(){
    setNow(-1); score=0; combo=0; maxCombo=0; miss=0; myPins=[]; hud();
    card.innerHTML =
      '<div class="step-no">시작하기</div>' +
      '<div class="title">연습용 컴퓨터 화면이에요</div>' +
      '<div class="guide">진짜 컴퓨터는 바뀌지 않아요. 마음껏 눌러 봐요!<br><b>이름을 꼭 적어요.</b> 내 작품에 이름이 들어가요.</div>' +
      deskHTML() +
      '<input class="name-in" id="nm" placeholder="이름을 적어요" maxlength="12" style="margin:14px auto 0;display:block;">' +
      '<div class="feedback" id="fb"></div>';
    fillIcons(shuffle(ICONS).slice(0,6));
    card.appendChild(btn('미션 시작 ▶', function(){
      var nm=(byId('nm').value||'').trim();
      if(!nm){ byId('fb').classList.add('no'); byId('fb').textContent='먼저 이름을 적어 주세요. ✏️'; var el=byId('nm'); el.style.borderColor='#e8584f'; el.focus(); return; }
      studentName=nm; level1();
    }));
    var nmEl=byId('nm'); if(nmEl) nmEl.addEventListener('input', function(){ this.style.borderColor='#cfd6e6'; });
  }

  /* ===== ① 화면 이름: 그림 큐 보고 화면 부분 누르기 (2라운드) ===== */
  function level1(){
    setNow(0);
    var parts=[
      {key:'icon', cue:'🖼️', n:'아이콘', hint:'그림 버튼 하나'},
      {key:'start', cue:'⊞', n:'시작 버튼', hint:'왼쪽 아래 칸'},
      {key:'task', cue:'⬛', n:'작업 표시줄', hint:'아래쪽 검은 막대'},
      {key:'bg', cue:'🟦', n:'바탕화면', hint:'넓은 파란 배경'}
    ];
    var rounds=[parts.slice(), shuffle(parts)];
    var ri=0;
    function playRound(){
      var seq=rounds[ri].slice(); var qi=0, ok=0, wrongHere=0;
      card.innerHTML =
        '<div class="step-no">미션 ① 화면 이름</div>' +
        '<div class="title">그림을 보고 화면에서 찾아 눌러요</div>' +
        '<div class="roundbar"><span class="round-badge">라운드 '+(ri+1)+' / 2</span></div>' +
        '<div class="cue" id="cue"></div>' +
        '<div class="progress" id="pg">0 / '+seq.length+'</div>' +
        deskHTML() +
        '<div class="feedback" id="fb"></div>';
      fillIcons(shuffle(ICONS).slice(0,6));
      var fb=byId('fb'), pg=byId('pg');
      function ask(){
        if(qi>=seq.length){ markDone(0); fb.textContent='🎉 화면 이름을 다 익혔어요!';
          if(ri<rounds.length-1){ ri++; card.appendChild(btn('라운드 '+(ri+1)+' ▶', playRound)); }
          else card.appendChild(btn('다음 ▶', level2));
          return;
        }
        var t=seq[qi]; wrongHere=0;
        var cue=byId('cue'); cue.innerHTML='<span class="lab">이걸 찾아요</span><span class="big">'+t.cue+'</span><span class="nm">'+t.n+'</span>';
        cue.classList.remove('pop'); void cue.offsetWidth; cue.classList.add('pop');
      }
      function correct(el){ if(el) flashHit(el); good(); ok++; pg.textContent=ok+' / '+seq.length; fb.textContent=comboMsg(pick(cheers)+' 👍'); qi++; ask(); }
      function wrong(el){ bad(); flashWrong(el); wrongHere++; fb.textContent = wrongHere>=2 ? '힌트: '+seq[qi].hint+' 🔎' : '거의 비슷해요! 다시 찾아봐요.'; }
      byId('desk').addEventListener('click', function(e){
        var t=seq[qi]; if(!t) return;
        var icon=e.target.closest('.dicon'); var st=e.target.closest('#start'); var tb=e.target.closest('#taskbar');
        if(t.key==='icon'){ icon?correct(icon):wrong(icon||byId('desk')); }
        else if(t.key==='start'){ st?correct(byId('start')):wrong(st||byId('desk')); }
        else if(t.key==='task'){ (tb && !st)?correct(byId('taskbar')):wrong(byId('desk')); }
        else if(t.key==='bg'){ (!icon && !tb)?correct(byId('desk')):wrong(icon||byId('desk')); }
      });
      ask();
    }
    playRound();
  }

  /* ===== ② 같은 그림 찾기: 변별·함정 (3라운드 점점 어렵게) ===== */
  function level2(){
    setNow(1);
    var rounds=[ {finds:3, pool:6, trap:false}, {finds:4, pool:9, trap:true}, {finds:5, pool:12, trap:true} ];
    var ri=0;
    function playRound(){
      var rd=rounds[ri];
      // 타깃 후보 우선 선택 → 함정(비슷한 그림) 같이 깔기
      var targets=shuffle(ICONS).slice(0, rd.finds);
      var poolSet={}; var pool=[];
      function add(it){ if(it && !poolSet[it.k]){ poolSet[it.k]=1; pool.push(it); } }
      targets.forEach(add);
      if(rd.trap){ targets.forEach(function(t){ (LOOKALIKE[t.k]||[]).forEach(function(lk){ if(pool.length<rd.pool) add(iconByK(lk)); }); }); }
      shuffle(ICONS).forEach(function(it){ if(pool.length<rd.pool) add(it); });
      pool=shuffle(pool);
      var ti=0, ok=0, wrongHere=0;
      card.innerHTML =
        '<div class="step-no">미션 ② 같은 그림 찾기</div>' +
        '<div class="title">위 그림과 똑같은 것을 눌러요</div>' +
        '<div class="roundbar"><span class="round-badge">라운드 '+(ri+1)+' / 3'+(rd.trap?' · 비슷한 함정 주의! ⚠️':'')+'</span></div>' +
        '<div class="cue" id="cue"></div>' +
        '<div class="progress" id="pg">0 / '+rd.finds+'</div>' +
        deskHTML() +
        '<div class="feedback" id="fb"></div>';
      fillIcons(pool);
      var fb=byId('fb'), pg=byId('pg');
      function ask(){
        if(ti>=targets.length){ markDone(1); fb.textContent='🎉 그림을 다 찾았어요!';
          if(ri<rounds.length-1){ ri++; card.appendChild(btn('라운드 '+(ri+1)+' ▶', playRound)); }
          else card.appendChild(btn('다음 ▶', level3));
          return;
        }
        wrongHere=0; var t=targets[ti];
        var cue=byId('cue'); cue.innerHTML='<span class="lab">찾아요</span><span class="big">'+t.e+'</span>';
        cue.classList.remove('pop'); void cue.offsetWidth; cue.classList.add('pop');
      }
      byId('icons').addEventListener('click', function(e){
        var d=e.target.closest('.dicon'); if(!d) return; var t=targets[ti]; if(!t) return;
        if(d.dataset.k===t.k){ flashHit(d); good(); ok++; pg.textContent=ok+' / '+targets.length; fb.textContent=comboMsg(pick(cheers)+' ⭐'); ti++; ask(); }
        else { bad(); flashWrong(d); wrongHere++; fb.textContent = wrongHere>=2 ? '잘 봐요! 그림이 조금 달라요 👀' : '비슷하지만 달라요! 다시 봐요.'; }
      });
      ask();
    }
    playRound();
  }

  /* ===== ③ 창 열고 닫기: 더블클릭 → 빨간 ✕ 로만 닫기 (함정: _ ☐) ===== */
  function level3(){
    setNow(2);
    var rounds=[
      {progs:[{k:'memo'},{k:'calc'}], all:false},
      {progs:[{k:'web'},{k:'pic'},{k:'music'}], all:false},
      {progs:[{k:'game'},{k:'mail'},{k:'paint'}], all:true}
    ];
    var ri=0;
    function playRound(){
      var rd=rounds[ri]; var progs=rd.progs.map(function(p){ return iconByK(p.k); });
      var pi=0, ok=0; var openCount=0; var needOpen = rd.all ? progs.length : 1;
      card.innerHTML =
        '<div class="step-no">미션 ③ 창 열고 닫기</div>' +
        '<div class="title">두 번 눌러 열고, 빨간 ✕로 닫아요</div>' +
        '<div class="guide" id="gd"></div>' +
        '<div class="roundbar"><span class="round-badge">라운드 '+(ri+1)+' / 3</span></div>' +
        '<div class="progress" id="pg">0 / '+progs.length+'</div>' +
        deskHTML() +
        '<div class="feedback" id="fb"></div>';
      fillIcons(progs);
      var fb=byId('fb'), pg=byId('pg'), desk=byId('desk');
      function ask(){
        if(pi>=progs.length){ markDone(2); fb.textContent='🎉 창을 잘 다뤘어요!';
          if(ri<rounds.length-1){ ri++; card.appendChild(btn('라운드 '+(ri+1)+' ▶', playRound)); }
          else card.appendChild(btn('다음 ▶', level4));
          return;
        }
        var p=progs[pi];
        byId('gd').innerHTML = rd.all
          ? '아이콘을 <b>두 번 빠르게</b> 눌러 모두 열어요. (남은 '+(progs.length-pi)+'개)'
          : '<b>'+p.e+' '+p.n+'</b>을(를) <b>두 번 빠르게</b> 눌러 열어요.';
      }
      function openWin(p){
        openCount++;
        var w=document.createElement('div'); w.className='win';
        w.innerHTML='<div class="bar">'+p.e+' '+p.n+
          '<div class="wbtns"><div class="wb min">_</div><div class="wb max">☐</div><div class="wb x">✕</div></div></div>'+
          '<div class="body">'+p.e+'<small>'+p.n+' 창</small></div>';
        // 함정 단추
        w.querySelector('.wb.min').addEventListener('click', function(){ fb.textContent='그건 "작게"예요. 닫기는 빨간 ✕ 🙂'; bad(); });
        w.querySelector('.wb.max').addEventListener('click', function(){ fb.textContent='그건 "크게"예요. 닫기는 빨간 ✕ 🙂'; bad(); });
        w.querySelector('.wb.x').addEventListener('click', function(){
          w.remove(); openCount--; good(); ok++; pg.textContent=ok+' / '+progs.length; fb.textContent=comboMsg(pick(cheers)+' 🪟'); pi++;
          // 위치 약간씩 어긋나게 (여러 창)
          ask();
        });
        // 여러 창 열릴 때 살짝 어긋나게 배치
        if(rd.all){ w.style.left=(40+openCount*16)+'%'; w.style.top=(30+openCount*10)+'px'; w.style.transform='none'; }
        desk.appendChild(w);
      }
      byId('icons').addEventListener('click', function(e){ if(e.target.closest('.dicon')) fb.textContent='두 번 빠르게 눌러요! ⚡'; });
      byId('icons').addEventListener('dblclick', function(e){
        var d=e.target.closest('.dicon'); if(!d) return;
        var alreadyAsk = rd.all ? null : progs[pi];
        if(!rd.all && d.dataset.k!==alreadyAsk.k){ fb.textContent='이번엔 '+alreadyAsk.e+' '+alreadyAsk.n+'을(를) 열어요.'; return; }
        if(d.dataset.opened){ return; }
        if(rd.all){ d.dataset.opened='1'; }
        openWin(iconByK(d.dataset.k));
        if(rd.all) byId('gd').innerHTML='열린 창을 빨간 ✕로 닫아요. 다른 것도 두 번 눌러 열어요.';
        else byId('gd').innerHTML='창이 열렸어요! 빨간 <b>✕</b>로 닫아요.';
      });
      ask();
    }
    playRound();
  }

  /* ===== ④ 즐겨찾기: 자주 쓰는 것 3개를 작업표시줄로 드래그 (함정: 휴지통은 X) ===== */
  function level4(){
    setNow(3);
    card.innerHTML =
      '<div class="step-no">미션 ④ 즐겨찾기</div>' +
      '<div class="title">자주 쓰는 것 3개를 아래 칸으로 끌어요</div>' +
      '<div class="guide">아이콘을 <b>꾹 눌러 작업 표시줄</b>로 끌어다 놓아요. <b id="cnt">0/3</b></div>' +
      deskHTML() +
      '<div class="feedback" id="fb">마음에 드는 것 3개를 골라요. (휴지통은 빼요!)</div>';
    myPins=[];
    var choices=shuffle(ICONS.filter(function(x){ return x.k!=='trash' && x.k!=='folder2'; })).slice(0,7);
    choices.push(iconByK('trash')); choices=shuffle(choices);
    fillIcons(choices);
    var fb=byId('fb'), cnt=byId('cnt');
    var slots=[byId('p0'),byId('p1'),byId('p2')];
    [].slice.call(byId('icons').children).forEach(function(d){ enablePinDrag(d); });

    function placePin(k){
      var it=iconByK(k); var slot=slots[myPins.length];
      if(!slot) return false;
      slot.textContent=it.e; slot.classList.add('filled'); myPins.push(k);
      cnt.textContent=myPins.length+'/3';
      // 사용한 아이콘 숨김
      var src=byId('icons').querySelector('.dicon[data-k="'+k+'"]'); if(src) src.style.visibility='hidden';
      good(); fb.textContent=comboMsg(pick(cheers)+' 📌');
      if(myPins.length>=3){ markDone(3); fb.textContent='🎉 작업 표시줄을 꾸몄어요!'; if(!byId('go4')) card.appendChild(btnId('다음 ▶', level5, 'go4')); }
      return true;
    }
    function enablePinDrag(file){
      var dragging=false, ox=0, oy=0, ghost=null, k=file.dataset.k;
      function overSlot(x,y){ for(var i=0;i<slots.length;i++){ if(slots[i].classList.contains('filled')) continue; var r=slots[i].getBoundingClientRect(); if(x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom) return slots[i]; } return null; }
      function overBar(x,y){ var r=byId('taskbar').getBoundingClientRect(); return x>=r.left&&x<=r.right&&y>=r.top&&y<=r.bottom; }
      function begin(x,y){
        if(file.style.visibility==='hidden') return;
        dragging=true;
        ghost=document.createElement('div'); ghost.className='floater'; ghost.textContent=iconByK(k).e;
        document.body.appendChild(ghost); mv(x,y);
      }
      function mv(x,y){ if(!dragging) return; ghost.style.left=(x-20)+'px'; ghost.style.top=(y-20)+'px';
        slots.forEach(function(s){ s.classList.remove('over'); }); var s=overSlot(x,y); if(s) s.classList.add('over'); }
      function end(x,y){
        if(!dragging) return; dragging=false; if(ghost){ ghost.remove(); ghost=null; }
        slots.forEach(function(s){ s.classList.remove('over'); });
        if(overBar(x,y)){
          if(k==='trash'){ bad(); fb.textContent='휴지통은 즐겨찾기에 안 올려요! 🗑️ 다른 걸 골라요.'; return; }
          placePin(k);
        }
      }
      file.addEventListener('mousedown', function(e){ e.preventDefault(); begin(e.clientX,e.clientY); });
      window.addEventListener('mousemove', function(e){ mv(e.clientX,e.clientY); });
      window.addEventListener('mouseup', function(e){ end(e.clientX,e.clientY); });
      file.addEventListener('touchstart', function(e){ var t=e.touches[0]; begin(t.clientX,t.clientY); }, {passive:true});
      window.addEventListener('touchmove', function(e){ if(dragging){ e.preventDefault(); var t=e.touches[0]; mv(t.clientX,t.clientY); } }, {passive:false});
      window.addEventListener('touchend', function(e){ var t=e.changedTouches[0]; end(t.clientX,t.clientY); });
    }
  }
  function btnId(label, fn, id, cls){ var b=btn(label, fn, cls); b.id=id; return b; }

  /* ===== ⑤ 종합 도전 (보스): 찾기+열기+닫기 섞어서 연속 도전 ===== */
  function level5(){
    setNow(4);
    var tasks = shuffle([
      {type:'find'}, {type:'find'}, {type:'open'}, {type:'find'}, {type:'open'}, {type:'find'}
    ]);
    var idx=0, ok=0;
    card.innerHTML =
      '<div class="step-no">미션 ⑤ 종합 도전</div>' +
      '<div class="title">섞여서 나와요! 끝까지 도전 🏁</div>' +
      '<div class="roundbar"><span class="round-badge boss">보스 도전 · 안 틀리면 골드 👑</span></div>' +
      '<div class="cue" id="cue"></div>' +
      '<div class="progress" id="pg">0 / '+tasks.length+'</div>' +
      deskHTML() +
      '<div class="feedback" id="fb"></div>';
    var fb=byId('fb'), pg=byId('pg'), desk=byId('desk');
    var pool=shuffle(ICONS).slice(0,9); fillIcons(pool);
    var target=null, mode=null, opened=false;
    function next(){
      if(idx>=tasks.length){ markDone(4); fb.textContent='🏆 종합 도전 성공!'; card.appendChild(btn('결과 보기 🏆', finish, 'gold')); return; }
      var t=tasks[idx]; opened=false;
      target=pick(pool);
      if(t.type==='find'){ mode='find'; byId('cue').innerHTML='<span class="lab">눌러요</span><span class="big">'+target.e+'</span>'; }
      else { mode='open'; byId('cue').innerHTML='<span class="lab">두 번 눌러 열기</span><span class="big">'+target.e+'</span>'; }
      byId('cue').classList.remove('pop'); void byId('cue').offsetWidth; byId('cue').classList.add('pop');
    }
    function advance(){ ok++; pg.textContent=ok+' / '+tasks.length; idx++; next(); }
    byId('icons').addEventListener('click', function(e){
      var d=e.target.closest('.dicon'); if(!d || mode!=='find') return;
      if(d.dataset.k===target.k){ flashHit(d); good(); fb.textContent=comboMsg('성공! ⭐'); advance(); }
      else { bad(); flashWrong(d); fb.textContent='앗, 그림을 다시 봐요!'; }
    });
    byId('icons').addEventListener('dblclick', function(e){
      var d=e.target.closest('.dicon'); if(!d || mode!=='open') return;
      if(d.dataset.k!==target.k){ fb.textContent='이번엔 '+target.e+' 을(를) 열어요.'; return; }
      if(opened) return; opened=true;
      var p=iconByK(d.dataset.k);
      var w=document.createElement('div'); w.className='win';
      w.innerHTML='<div class="bar">'+p.e+' '+p.n+'<div class="wbtns"><div class="wb x">✕</div></div></div><div class="body">'+p.e+'<small>'+p.n+' 창</small></div>';
      w.querySelector('.wb.x').addEventListener('click', function(){ w.remove(); good(); fb.textContent=comboMsg('열고 닫기 성공! 🪟'); advance(); });
      desk.appendChild(w);
      fb.textContent='열렸어요! 빨간 ✕로 닫아요.';
    });
    next();
  }

  /* ===== 완료: 나의 컴퓨터 자리 체크 + 저장 ===== */
  var RESULT_BASENAME='바탕화면마스터', RESULT_TITLE='나의 컴퓨터 자리 체크';
  var _saveDataUrl=null, _savePending=false, _saveTimer=null;
  function badgesHTML(){
    var b='';
    b+='<div class="badge"><span class="be">🏅</span>완주</div>';
    if(maxCombo>=5) b+='<div class="badge"><span class="be">🔥</span>콤보왕</div>';
    if(miss<=2) b+='<div class="badge"><span class="be">🎯</span>정확왕</div>';
    if(maxCombo>=5 && miss<=2) b+='<div class="badge"><span class="be">👑</span>마스터</div>';
    return b;
  }
  function finish(){
    setNow(-1);
    var who=studentName?studentName+' 님':'여러분';
    var pinTxt = myPins.length ? myPins.map(function(k){ var it=iconByK(k); return it.e+' '+it.n; }).join('  ') : '(없음)';
    card.innerHTML =
      '<div class="done-screen">' +
        '<div id="result" class="result-card">' +
          '<div class="big">🏆</div>' +
          '<h2>'+who+', 바탕화면 마스터!</h2>' +
          '<div class="stars">⭐ 점수 '+score+'점 · 최고 콤보 🔥x'+maxCombo+'</div>' +
          '<div class="badges">'+badgesHTML()+'</div>' +
          '<div class="sheet">' +
            '<h3>나의 컴퓨터 자리 체크</h3>' +
            '<ul>' +
              '<li>✅ 바탕화면·아이콘·작업표시줄·시작버튼을 안다</li>' +
              '<li>✅ 비슷한 그림을 구분해서 찾을 수 있다</li>' +
              '<li>✅ 창을 두 번 눌러 열고 빨간 ✕로 닫는다</li>' +
              '<li>✅ 즐겨찾기: <span class="mine">'+pinTxt+'</span></li>' +
            '</ul>' +
            '<div class="who-line">만든 사람: <b>'+(studentName||'')+'</b></div>' +
          '</div>' +
        '</div>' +
        '<p style="font-size:19px;color:#5b6172;margin:12px 0 0;">참 잘했어요. 박수! 👏</p>' +
        '<div class="feedback" id="savefb">아래 버튼으로 내 작품을 저장해요.</div>' +
        '<div class="row-btns">' +
          '<button class="btn" id="save">💾 내 작품 저장하기</button>' +
          '<button class="btn gray" id="rt">다시 하기 🔄</button>' +
        '</div>' +
        '<div class="row-btns" id="dlrow" style="display:none;">' +
          '<button class="btn gray" id="dl">이미지로 내려받기 📥</button>' +
        '</div>' +
      '</div>';
    byId('save').addEventListener('click', doSave);
    byId('rt').addEventListener('click', function(){ chips.forEach(function(c,k){ c.className='chip'; c.textContent=chipLabels[k]; }); start(); });
    byId('dl').addEventListener('click', function(){ if(_saveDataUrl) SAVE.download(_saveDataUrl, (studentName?studentName+'_':'')+RESULT_BASENAME+'.png'); });
  }

  function doSave(){
    var node=byId('result'), fb=byId('savefb'), sbtn=byId('save');
    fb.style.color='#3b6fe0'; fb.textContent='저장 중… ⏳'; sbtn.disabled=true;
    SAVE.capture(node, function(dataUrl){
      if(!dataUrl){ fb.style.color='#d6452b'; fb.textContent='이미지를 만들지 못했어요. 다시 눌러 주세요.'; sbtn.disabled=false; return; }
      _saveDataUrl=dataUrl;
      if(window.parent && window.parent!==window){
        _savePending=true;
        window.parent.postMessage({ type:'student-work-save', mimeType:'image/png', dataUrl:dataUrl, fileName:RESULT_BASENAME+'.png', title:RESULT_TITLE, studentName:studentName }, '*');
        _saveTimer=setTimeout(function(){ if(_savePending){ _savePending=false; fb.style.color='#d6452b'; fb.textContent='저장이 늦어요. 아래 버튼으로 내려받아요.'; byId('dlrow').style.display='flex'; sbtn.disabled=false; } }, 12000);
      } else {
        SAVE.download(dataUrl, (studentName?studentName+'_':'')+RESULT_BASENAME+'.png');
        fb.style.color='#1a7f47'; fb.textContent='이미지를 내려받았어요! 📥'; sbtn.disabled=false;
      }
    });
  }

  window.addEventListener('message', function(e){
    var d=e.data; if(!d || d.type!=='student-work-saved') return;
    if(!_savePending) return; _savePending=false; if(_saveTimer) clearTimeout(_saveTimer);
    var fb=byId('savefb'), sbtn=byId('save');
    if(d.ok){ if(fb){ fb.style.color='#1a7f47'; fb.textContent='저장됐어요! 🎉 선생님이 확인 후 홈페이지에 올려요.'; } if(sbtn){ sbtn.textContent='✅ 저장 완료'; } }
    else { if(fb){ fb.style.color='#d6452b'; fb.textContent='저장 실패: '+(d.error||'')+' 아래 버튼으로 내려받아요.'; } if(byId('dlrow')) byId('dlrow').style.display='flex'; if(sbtn) sbtn.disabled=false; }
  });

  start();
})();
</script>
