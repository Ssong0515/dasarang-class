<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>컴퓨터 수업 - 1페이지</title>
  <style>
    :root{
      --frame-width:min(980px,100%);
      --frame-height:min(620px,calc(100vh - 72px));
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#0f172a;
      color:#fff;
      overflow:hidden;
    }
    .slide{
      width:100vw;
      height:100svh;
      min-height:100vh;
      position:relative;
      background-image:url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1800&q=80');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      overflow:hidden;
      padding:36px 32px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(15,23,42,.42),rgba(15,23,42,.84));
    }
    .frame{
      position:relative;
      z-index:2;
      width:var(--frame-width);
      min-height:560px;
      text-align:center;
      background:rgba(15,23,42,.52);
      border:1px solid rgba(255,255,255,.14);
      border-radius:28px;
      backdrop-filter:blur(12px);
      box-shadow:0 24px 60px rgba(0,0,0,.28);
      padding:22px 22px 24px;
      display:flex;
      flex-direction:column;
      justify-content:flex-start;
      overflow:visible;
    }
    .hero-icon{
      font-size:64px;
      line-height:1;
      margin-bottom:10px;
    }
    .title{
      margin:0;
      font-size:clamp(34px,4.8vw,58px);
      font-weight:800;
      line-height:1.1;
    }
    .subtitle-wrap{margin-top:10px; margin-bottom:6px;}
    .subtitle{
      font-size:clamp(18px,1.9vw,24px);
      line-height:1.4;
      margin:0;
    }
    .subtitle-small{
      font-size:14px;
      line-height:1.35;
      opacity:.88;
      margin-top:4px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      width:100%;
      margin:14px auto 0;
      align-content:stretch;
    }
    .card{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      border-radius:22px;
      overflow:hidden;
      text-align:left;
      min-width:0;
    }
    .card img{
      width:100%;
      height:152px;
      object-fit:cover;
      display:block;
    }
    .card-body{
      padding:12px 14px 14px;
    }
    .card-title{
      margin:0 0 6px;
      font-size:22px;
      font-weight:800;
      line-height:1.2;
    }
    .card-text{
      margin:0;
      font-size:16px;
      line-height:1.4;
      opacity:.96;
    }
    .card-trans{
      margin-top:8px;
      font-size:13px;
      line-height:1.3;
      opacity:.8;
    }
    @media (max-width:900px){
      .slide{padding:28px 20px;}
      .frame{padding:18px 18px 20px;}
      .grid{gap:12px; margin-top:18px;}
      .card img{height:136px;}
      .card-title{font-size:19px;}
      .card-text{font-size:14px;}
    }
    @media (max-width:640px){
      .slide{padding:14px 12px;}
      .frame{min-height:0; padding:18px 14px 20px; border-radius:20px;}
      .hero-icon{font-size:48px;}
      .title{font-size:28px;}
      .subtitle{font-size:15px;}
      .subtitle-small{font-size:12px;}
      .grid{grid-template-columns:1fr; gap:10px; margin-top:16px;}
      .card img{height:120px;}
      .card-body{padding:12px 12px 14px;}
      .card-title{font-size:17px;}
      .card-text{font-size:14px;}
      .card-trans{font-size:11px;}
    }
  </style>
</head>
<body>
  <section class="slide">
    <div class="overlay"></div>

    <div class="frame">
      <div class="hero-icon">👨‍💻</div>
      <h1 class="title">컴퓨터 수업</h1>
      <div class="subtitle-wrap">
        <p class="subtitle">보고 따라하고, 손으로 직접 해보는 수업입니다</p>
        <div class="subtitle-small">Learn by watching and following</div>
        <div class="subtitle-small">Учимся, смотря и повторяя</div>
      </div>

      <div class="grid">
        <div class="card">
          <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=1200&q=80" alt="선생님이 설명하는 모습" />
          <div class="card-body">
            <p class="card-title">설명</p>
            <p class="card-text">선생님이 화면을 보며 천천히 설명합니다</p>
            <div class="card-trans">Teacher explains step by step / Учитель объясняет шаг за шагом</div>
          </div>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=1200&q=80" alt="학생과 함께 실습하는 모습" />
          <div class="card-body">
            <p class="card-title">연습</p>
            <p class="card-text">보고 따라하면서 같이 직접 연습합니다</p>
            <div class="card-trans">Practice together / Практикуем вместе</div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
