<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>컴퓨터 수업 - 1페이지</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
      color: #fff;
      overflow: hidden;
    }
    
    
    .slide {
      width: 100vw;
      height: 100vh;
      position: relative;
      background-image: url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1800&q=80');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,23,42,.35), rgba(15,23,42,.72));
    }
    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 18px;
      padding: 32px 40px 92px;
    }
    .hero-icon {
      font-size: 92px;
      line-height: 1;
      filter: drop-shadow(0 8px 18px rgba(0,0,0,.3));
    }
    .title {
      font-size: clamp(40px, 6vw, 76px);
      font-weight: 800;
      line-height: 1.1;
      margin: 0;
      text-shadow: 0 10px 30px rgba(0,0,0,.3);
    }
    .subtitle {
      font-size: clamp(22px, 2.4vw, 34px);
      line-height: 1.45;
      margin: 0;
      max-width: 1100px;
      text-shadow: 0 6px 20px rgba(0,0,0,.28);
    }
    .subtitle-small{
      font-size:16px;
      opacity:0.9;
      margin-top:4px;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      justify-content: center;
      margin-top: 8px;
    }
    .chip {
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 22px;
      font-weight: 700;
      backdrop-filter: blur(8px);
    }
    @media (max-width: 1100px) {
      .content { padding: 24px 20px 92px; }
    }
  </style>
</head>
<body>
  <section class="slide">
    <div class="overlay"></div>
    <div class="content">
      <div class="hero-icon">👨‍💻</div>
      <h1 class="title">컴퓨터 수업</h1>
      <div>
      <p class="subtitle">보고 따라하고, 손으로 직접 해보는 수업입니다</p>
      <div class="subtitle-small">Learn by watching and following</div>
      <div class="subtitle-small">Учимся, смотря и повторяя</div>
      </div>
      <div class="chip-row">
        <div class="chip">컴퓨터<br><span style="font-size:12px;opacity:.8">Computer / Компьютер</span></div>
        <div class="chip">마우스<br><span style="font-size:12px;opacity:.8">Mouse / Мышь</span></div>
        <div class="chip">키보드<br><span style="font-size:12px;opacity:.8">Keyboard / Клавиатура</span></div>
        <div class="chip">타이핑<br><span style="font-size:12px;opacity:.8">Typing / Печать</span></div>
      </div>
    </div>
  </section>
</body>
</html>
