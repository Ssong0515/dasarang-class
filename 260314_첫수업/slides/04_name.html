<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>컴퓨터 수업 - 다음 페이지</title>
  <style>
    :root{
      --frame-width:min(980px,100%);
      --frame-height:min(620px,calc(100vh - 72px));
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#0f172a;
      color:#fff;
      overflow:hidden;
    }
    .slide{
      width:100vw;
      height:100svh;
      min-height:100vh;
      position:relative;
      background:linear-gradient(180deg,#0f172a 0%,#111827 100%);
      overflow:hidden;
      padding:36px 32px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .frame{
      width:var(--frame-width);
      min-height:560px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:28px;
      backdrop-filter:blur(12px);
      box-shadow:0 24px 60px rgba(0,0,0,.28);
      padding:18px 18px 18px;
      display:flex;
      flex-direction:column;
      overflow:visible;
    }
    .header{
      text-align:center;
      margin-bottom:12px;
    }
    .hero-icon{
      font-size:38px;
      line-height:1;
      margin-bottom:8px;
    }
    .title{
      margin:0;
      font-size:clamp(26px,3.6vw,40px);
      font-weight:800;
      line-height:1.1;
    }
    .subtitle{
      margin:8px 0 0;
      font-size:clamp(15px,1.5vw,19px);
      line-height:1.35;
    }
    .subtitle-small{
      font-size:12px;
      line-height:1.3;
      opacity:.88;
      margin-top:3px;
      text-align:center;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin-top:12px;
      flex:1;
    }
    .card{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      overflow:hidden;
      min-width:0;
      display:flex;
      flex-direction:column;
    }
    .art{
      width:100%;
      height:114px;
      display:block;
      background:#eaf3ff;
    }
    .body{
      padding:10px 11px 11px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .name{
      margin:0;
      font-size:19px;
      font-weight:800;
      line-height:1.15;
    }
    .desc{
      margin:0;
      font-size:14px;
      line-height:1.4;
      opacity:.97;
    }
    .trans{
      margin-top:4px;
      display:flex;
      flex-direction:column;
      gap:5px;
      font-size:12px;
      line-height:1.3;
      opacity:.82;
    }
    .trans-ru{
      padding-top:5px;
      border-top:1px solid rgba(255,255,255,.12);
    }
    @media (max-width:900px){
      .slide{padding:28px 18px;}
      .frame{padding:14px 14px 14px;}
      .grid{gap:10px;}
      .art{height:106px;}
      .name{font-size:17px;}
      .desc{font-size:13px;}
    }
    
    @media (max-width:640px){
      .slide{padding:44px 12px;}
      .frame{min-height:0; padding:12px 11px 13px;border-radius:20px;}
      .hero-icon{font-size:34px;}
      .title{font-size:24px;}
      .subtitle{font-size:13px;}
      .subtitle-small{font-size:11px;}
      .grid{grid-template-columns:1fr;gap:10px;margin-top:12px;}
      .art{height:104px;}
      .body{padding:11px 11px 12px;}
      .name{font-size:16px;}
      .desc{font-size:13px;}
      .trans{font-size:11px;}
    }
  </style>
</head>
<body>
  <section class="slide">
    <div class="frame">
      <div class="header">
        <div class="hero-icon">🖥️</div>
        <h1 class="title">명칭 알기</h1>
        <p class="subtitle">컴퓨터를 사용할 때 자주 보는 이름을 먼저 배웁니다</p>
        <div class="subtitle-small">Learn the names</div>
        <div class="subtitle-small">Учим названия</div>
      </div>

      <div class="grid">
        <div class="card">
          <img class="art" alt="모니터 일러스트" src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 320'%3E%3Crect width='600' height='320' fill='%23eaf3ff'/%3E%3Crect x='130' y='55' width='340' height='185' rx='18' fill='%23334155'/%3E%3Crect x='150' y='74' width='300' height='146' rx='10' fill='%2393c5fd'/%3E%3Crect x='266' y='240' width='68' height='16' rx='8' fill='%2394a3b8'/%3E%3Crect x='238' y='255' width='124' height='14' rx='7' fill='%23cbd5e1'/%3E%3Ctext x='300' y='40' font-size='28' text-anchor='middle' font-family='Arial' font-weight='700' fill='%231e293b'%3E모니터%3C/text%3E%3C/svg%3E" />
          <div class="body">
            <p class="name">모니터</p>
            <p class="desc">화면을 보는 곳입니다.</p>
            <div class="trans">
              <span>Monitor</span>
              <span class="trans-ru">Монитор</span>
            </div>
          </div>
        </div>

        <div class="card">
          <img class="art" alt="키보드 일러스트" src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 320'%3E%3Crect width='600' height='320' fill='%23eaf3ff'/%3E%3Crect x='120' y='120' width='360' height='110' rx='18' fill='%23e5e7eb' stroke='%2394a3b8' stroke-width='4'/%3E%3Cg fill='%23cbd5e1'%3E%3Crect x='150' y='145' width='34' height='18' rx='4'/%3E%3Crect x='190' y='145' width='34' height='18' rx='4'/%3E%3Crect x='230' y='145' width='34' height='18' rx='4'/%3E%3Crect x='270' y='145' width='34' height='18' rx='4'/%3E%3Crect x='310' y='145' width='34' height='18' rx='4'/%3E%3Crect x='350' y='145' width='34' height='18' rx='4'/%3E%3Crect x='390' y='145' width='58' height='18' rx='4'/%3E%3Crect x='150' y='173' width='60' height='18' rx='4'/%3E%3Crect x='216' y='173' width='34' height='18' rx='4'/%3E%3Crect x='256' y='173' width='34' height='18' rx='4'/%3E%3Crect x='296' y='173' width='108' height='18' rx='4'/%3E%3C/g%3E%3Ctext x='300' y='70' font-size='28' text-anchor='middle' font-family='Arial' font-weight='700' fill='%231e293b'%3E키보드%3C/text%3E%3C/svg%3E" />
          <div class="body">
            <p class="name">키보드</p>
            <p class="desc">글자와 숫자를 입력하는 도구입니다.</p>
            <div class="trans">
              <span>Keyboard</span>
              <span class="trans-ru">Клавиатура</span>
            </div>
          </div>
        </div>

        <div class="card">
          <img class="art" alt="마우스 일러스트" src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 320'%3E%3Crect width='600' height='320' fill='%23eaf3ff'/%3E%3Crect x='240' y='90' width='120' height='160' rx='48' fill='%23f8fafc' stroke='%2394a3b8' stroke-width='4'/%3E%3Cline x1='300' y1='115' x2='300' y2='155' stroke='%2394a3b8' stroke-width='4'/%3E%3Ctext x='300' y='60' font-size='28' text-anchor='middle' font-family='Arial' font-weight='700' fill='%231e293b'%3E마우스%3C/text%3E%3C/svg%3E" />
          <div class="body">
            <p class="name">마우스</p>
            <p class="desc">움직이고 누르는 도구입니다.</p>
            <div class="trans">
              <span>Mouse</span>
              <span class="trans-ru">Мышь</span>
            </div>
          </div>
        </div>

        <div class="card">
          <img class="art" alt="노트북 일러스트" src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 320'%3E%3Crect width='600' height='320' fill='%23eaf3ff'/%3E%3Crect x='160' y='55' width='280' height='165' rx='18' fill='%23334155'/%3E%3Crect x='180' y='74' width='240' height='126' rx='10' fill='%2393c5fd'/%3E%3Cpath d='M125 235 L475 235 L425 270 L175 270 Z' fill='%23d1d5db' stroke='%2394a3b8' stroke-width='4'/%3E%3Ctext x='300' y='40' font-size='28' text-anchor='middle' font-family='Arial' font-weight='700' fill='%231e293b'%3E노트북%3C/text%3E%3C/svg%3E" />
          <div class="body">
            <p class="name">노트북</p>
            <p class="desc">화면과 키보드가 함께 있는 컴퓨터입니다.</p>
            <div class="trans">
              <span>Laptop</span>
              <span class="trans-ru">Ноутбук</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
