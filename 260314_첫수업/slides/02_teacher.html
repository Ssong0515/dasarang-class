<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>컴퓨터 수업 - 2페이지</title>
  <style>
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:#0f172a;
      color:#fff;
      overflow:hidden;
    }
    .slide{
      width:100vw;
      height:100svh;
      min-height:100vh;
      position:relative;
      background-image:url('https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=1800&q=80');
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      overflow:hidden;
      padding:32px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,rgba(15,23,42,.45),rgba(15,23,42,.82));
    }
    .frame{
      position:relative;
      z-index:2;
      width:min(1080px,100%);
      background:rgba(15,23,42,.54);
      border:1px solid rgba(255,255,255,.14);
      border-radius:28px;
      backdrop-filter:blur(12px);
      box-shadow:0 24px 60px rgba(0,0,0,.28);
      padding:28px;
    }
    .header{
      text-align:center;
      margin-bottom:22px;
    }
    .hero-icon{
      font-size:52px;
      line-height:1;
      margin-bottom:12px;
    }
    .title{
      margin:0;
      font-size:clamp(30px,4vw,48px);
      font-weight:800;
      line-height:1.1;
    }
    .subtitle-wrap{
      margin-top:10px;
    }
    .subtitle{
      font-size:clamp(17px,1.7vw,22px);
      line-height:1.35;
      margin:0;
    }
    .subtitle-small{
      font-size:13px;
      line-height:1.35;
      opacity:.88;
      margin-top:3px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:18px;
      align-items:stretch;
    }
    .card{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      border-radius:22px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-width:0;
    }
    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
      display:block;
    }
    .card-body{
      padding:14px 16px 16px;
      display:flex;
      flex-direction:column;
      gap:6px;
      flex:1;
    }
    .card-title{
      margin:0;
      font-size:22px;
      font-weight:800;
      line-height:1.2;
    }
    .card-text{
      margin:0;
      font-size:16px;
      line-height:1.4;
      opacity:.98;
    }
    .trans{
      margin-top:auto;
      font-size:12px;
      line-height:1.35;
      opacity:.82;
    }
    @media (max-width:900px){
      .slide{padding:20px;}
      .frame{padding:20px;}
      .card img{height:150px;}
    }
    @media (max-width:640px){
      .slide{padding:14px;}
      .frame{padding:16px;border-radius:20px;}
      .grid{gap:12px;}
      .card img{height:110px;}
      .hero-icon{font-size:42px;margin-bottom:8px;}
      .title{font-size:28px;}
      .subtitle{font-size:15px;}
      .subtitle-small{font-size:11px;}
      .card-title{font-size:17px;}
      .card-text{font-size:13px;}
      .trans{font-size:10px;}
    }
  </style>
</head>
<body>
  <section class="slide">
    <div class="overlay"></div>

    <div class="frame">
      <div class="header">
        <div class="hero-icon">🙋‍♂️</div>
        <h1 class="title">선생님 소개</h1>
        <div class="subtitle-wrap">
          <p class="subtitle">앞으로 함께 컴퓨터 수업을 진행합니다</p>
          <div class="subtitle-small">We will learn computer together</div>
          <div class="subtitle-small">Мы будем изучать компьютер вместе</div>
        </div>
      </div>

      <div class="grid">
        <div class="card">
          <img src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=1200&q=80" alt="설명하는 모습" />
          <div class="card-body">
            <p class="card-title">설명</p>
            <p class="card-text">화면을 보면서 천천히 설명합니다</p>
            <div class="trans">Explain step by step / Объяснение</div>
          </div>
        </div>

        <div class="card">
          <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=1200&q=80" alt="함께 연습하는 모습" />
          <div class="card-body">
            <p class="card-title">연습</p>
            <p class="card-text">보고 따라하면서 같이 연습합니다</p>
            <div class="trans">Practice together / Практика</div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
