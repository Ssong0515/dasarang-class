media:
  input: public
  output: /

content:
  - name: class-notes
    label: Class Notes
    type: collection
    path: src/content/classNotes
    filename: "{primary}.md"
    view:
      primary: title
      fields: [title, course, date]
      sort: [date, title]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: course
        label: Course
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: body
        label: Note
        type: rich-text
